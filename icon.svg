<?xml version="1.0" encoding="UTF-8"?>
<!-- Hogwarts — four-tower keep mark (full color, marketplace). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a7a94"/>
      <stop offset="50%" stop-color="#3d4a5c"/>
      <stop offset="100%" stop-color="#1e2633"/>
    </linearGradient>
    <linearGradient id="night" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141a28"/>
      <stop offset="100%" stop-color="#0a0c12"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b2c6f"/>
      <stop offset="100%" stop-color="#2c1840"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#night)"/>
  <!-- stars -->
  <circle cx="14" cy="12" r="0.8" fill="#c9b27a" opacity="0.7"/>
  <circle cx="50" cy="16" r="0.6" fill="#c9b27a" opacity="0.5"/>
  <circle cx="42" cy="10" r="0.5" fill="#e8e8e8" opacity="0.4"/>
  <!-- left tower -->
  <rect x="10" y="28" width="10" height="22" fill="url(#stone)"/>
  <path fill="url(#roof)" d="M8 28 L15 16 L22 28 Z"/>
  <rect x="13" y="34" width="2.5" height="3.5" rx="0.4" fill="#1a1814"/>
  <rect x="13" y="42" width="2.5" height="3.5" rx="0.4" fill="#1a1814"/>
  <!-- right tower -->
  <rect x="44" y="28" width="10" height="22" fill="url(#stone)"/>
  <path fill="url(#roof)" d="M42 28 L49 16 L56 28 Z"/>
  <rect x="48.5" y="34" width="2.5" height="3.5" rx="0.4" fill="#1a1814"/>
  <rect x="48.5" y="42" width="2.5" height="3.5" rx="0.4" fill="#1a1814"/>
  <!-- central keep -->
  <rect x="22" y="24" width="20" height="26" fill="url(#stone)"/>
  <path fill="url(#roof)" d="M20 24 L32 10 L44 24 Z"/>
  <!-- great hall windows (warm) -->
  <rect x="26" y="32" width="3" height="5" rx="0.4" fill="#c9a227" opacity="0.85"/>
  <rect x="31" y="32" width="3" height="5" rx="0.4" fill="#c9a227" opacity="0.85"/>
  <rect x="36" y="32" width="3" height="5" rx="0.4" fill="#c9a227" opacity="0.85"/>
  <!-- gate -->
  <path fill="#0d0d0d" d="M29 42 h6 a3 3 0 0 1 0 6 h-6 z"/>
  <!-- curtain wall base -->
  <rect x="10" y="48" width="44" height="4" fill="#2a3344"/>
</svg>
